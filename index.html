<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Friends</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #70c5ce;
    font-family: Arial, sans-serif;
    touch-action: none;
    position: fixed;
  }

  #gameContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #gameCanvas {
    background: #70c5ce;
    display: block;
    touch-action: none;
  }

  #uiOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    pointer-events: auto;
    text-align: center;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    padding: 20px;
    max-height: 90%;
    overflow-y: auto;
  }

  .screen.active {
    display: flex;
  }

  h1 {
    font-size: 1.8em;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 3px 3px 0px #ff6b6b, 3px 3px 8px rgba(0,0,0,0.4);
  }

  h2 {
    font-size: 1.3em;
    margin-bottom: 15px;
  }

  .char-select {
    display: flex;
    gap: 10px;
    margin: 15px 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .char-option {
    background: rgba(255,255,255,0.9);
    border: 4px solid transparent;
    border-radius: 15px;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    width: 80px;
  }

  .char-option.selected {
    border-color: #ffd700;
    transform: scale(1.1);
  }

  .char-option canvas {
    display: block;
    margin: 0 auto;
  }

  .char-name {
    color: #333;
    font-size: 0.75em;
    margin-top: 5px;
    text-shadow: none;
    font-weight: bold;
  }

  button {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 14px 36px;
    font-size: 1.2em;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 0 #d64545;
    font-weight: bold;
    transition: transform 0.1s;
    margin-top: 10px;
  }

  button:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #d64545;
  }

  #scoreDisplay {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.5em;
    color: white;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    font-weight: bold;
    display: none;
    pointer-events: none;
    z-index: 10;
  }

  #finalScore {
    font-size: 1.4em;
    margin: 8px 0;
  }

  #bestScore {
    font-size: 1.1em;
    margin-bottom: 8px;
  }

  .instructions {
    font-size: 0.85em;
    margin-top: 12px;
    opacity: 0.9;
  }

  #loadingMsg {
    color: white;
    font-size: 1.2em;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="scoreDisplay">0</div>

  <div id="uiOverlay">
    <div class="screen" id="loadingScreen" style="display:flex;">
      <div id="loadingMsg">불러오는 중...</div>
    </div>

    <div class="screen" id="startScreen">
      <h1>🐦 Flappy Friends</h1>
      <h2>캐릭터를 선택하세요</h2>
      <div class="char-select" id="charSelect"></div>
      <button id="startBtn" type="button">게임 시작</button>
      <p class="instructions">화면을 터치해서 날아오르세요!</p>
    </div>

    <div class="screen" id="gameOverScreen">
      <h1>게임 오버!</h1>
      <div id="finalScore">점수: 0</div>
      <div id="bestScore">최고 점수: 0</div>
      <button id="retryBtn" type="button">다시 하기</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===================== 캔버스 설정 =====================
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');

  function resizeCanvas() {
    var maxWidth = 480;
    var maxHeight = 720;
    var availW = window.innerWidth;
    var availH = window.innerHeight;

    var w = Math.min(availW, maxWidth);
    var h = Math.min(availH, maxHeight);

    var targetRatio = 2 / 3;
    if (w / h > targetRatio) {
      w = h * targetRatio;
    } else {
      h = w / targetRatio;
    }

    canvas.width = Math.floor(w);
    canvas.height = Math.floor(h);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', function() {
    setTimeout(resizeCanvas, 200);
  });

  // ===================== 캐릭터 정의 =====================
  var characters = [
    { name: '병아리', body: '#FFD93D', wing: '#FFA500', accent: '#FF6B6B', type: 'chick' },
    { name: '문어', body: '#FF6B9D', wing: '#C44569', accent: '#FFFFFF', type: 'octopus' },
    { name: '드래곤', body: '#6BCB77', wing: '#4D96FF', accent: '#FFD93D', type: 'dragon' }
  ];

  var selectedCharIndex = 0;

  function drawBird(context, x, y, rotation, charData, scale, isPreview) {
    context.save();
    context.translate(x, y);
    if (!isPreview) context.rotate(rotation);
    context.scale(scale, scale);

    var size = isPreview ? 20 : 18;

    if (charData.type === 'chick') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.ellipse(0, 0, size, size * 0.85, 0, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      context.beginPath();
      context.ellipse(-size * 0.3, size * 0.1, size * 0.5, size * 0.35, -0.3, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = '#333333';
      context.beginPath();
      context.arc(size * 0.35, -size * 0.15, size * 0.15, 0, Math.PI * 2);
      context.fill();
      context.fillStyle = '#ffffff';
      context.beginPath();
      context.arc(size * 0.4, -size * 0.2, size * 0.05, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.accent;
      context.beginPath();
      context.moveTo(size * 0.7, 0);
      context.lineTo(size * 1.15, size * 0.08);
      context.lineTo(size * 0.7, size * 0.25);
      context.closePath();
      context.fill();

      context.fillStyle = 'rgba(255,150,150,0.6)';
      context.beginPath();
      context.arc(size * 0.15, size * 0.25, size * 0.15, 0, Math.PI * 2);
      context.fill();

    } else if (charData.type === 'octopus') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.arc(0, -size * 0.1, size * 0.9, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      for (var i = -2; i <= 2; i++) {
        context.beginPath();
        context.arc(i * size * 0.35, size * 0.55, size * 0.28, 0, Math.PI * 2);
        context.fill();
      }

      context.fillStyle = charData.accent;
      context.beginPath();
      context.arc(-size * 0.25, -size * 0.2, size * 0.22, 0, Math.PI * 2);
      context.arc(size * 0.25, -size * 0.2, size * 0.22, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = '#333333';
      context.beginPath();
      context.arc(-size * 0.25, -size * 0.15, size * 0.1, 0, Math.PI * 2);
      context.arc(size * 0.25, -size * 0.15, size * 0.1, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = 'rgba(255,150,150,0.5)';
      context.beginPath();
      context.arc(-size * 0.5, size * 0.15, size * 0.15, 0, Math.PI * 2);
      context.arc(size * 0.5, size * 0.15, size * 0.15, 0, Math.PI * 2);
      context.fill();

    } else if (charData.type === 'dragon') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.ellipse(0, 0, size, size * 0.85, 0, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      context.beginPath();
      context.moveTo(-size * 0.3, -size * 0.1);
      context.lineTo(-size * 1.1, -size * 0.5);
      context.lineTo(-size * 0.5, size * 0.3);
      context.closePath();
      context.fill();

      context.fillStyle = charData.accent;
      context.beginPath();
      context.moveTo(-size * 0.3, -size * 0.75);
      context.lineTo(-size * 0.15, -size * 1.15);
      context.lineTo(size * 0.05, -size * 0.75);
      context.closePath();
      context.fill();

      context.fillStyle = '#333333';
      context.beginPath();
      context.arc(size * 0.35, -size * 0.15, size * 0.15, 0, Math.PI * 2);
      context.fill();
      context.fillStyle = '#ffffff';
      context.beginPath();
      context.arc(size * 0.4, -size * 0.2, size * 0.05, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.accent;
      context.beginPath();
      context.moveTo(size * 0.75, 0);
      context.lineTo(size * 1.15, size * 0.05);
      context.lineTo(size * 0.75, size * 0.2);
      context.closePath();
      context.fill();

      context.fillStyle = 'rgba(255,150,150,0.5)';
      context.beginPath();
      context.arc(size * 0.15, size * 0.3, size * 0.15, 0, Math.PI * 2);
      context.fill();
    }

    context.restore();
  }

  // ===================== 캐릭터 선택 UI 생성 =====================
  var charSelectDiv = document.getElementById('charSelect');
  characters.forEach(function(char, index) {
    var div = document.createElement('div');
    div.className = 'char-option' + (index === 0 ? ' selected' : '');

    var previewCanvas = document.createElement('canvas');
    previewCanvas.width = 60;
    previewCanvas.height = 60;

    var nameDiv = document.createElement('div');
    nameDiv.className = 'char-name';
    nameDiv.textContent = char.name;

    div.appendChild(previewCanvas);
    div.appendChild(nameDiv);

    div.addEventListener('click', function() {
      var allOptions = document.querySelectorAll('.char-option');
      for (var j = 0; j < allOptions.length; j++) {
        allOptions[j].classList.remove('selected');
      }
      div.classList.add('selected');
      selectedCharIndex = index;
    });

    charSelectDiv.appendChild(div);

    var pctx = previewCanvas.getContext('2d');
    drawBird(pctx, 30, 30, 0, char, 1, true);
  });

  // ===================== 게임 변수 =====================
  var gameState = 'start';
  var bird, pipes, score, frameCount, gameSpeed;
  var bestScore = 0;

  try {
    var stored = localStorage.getItem('flappyBest');
    if (stored) bestScore = parseInt(stored, 10) || 0;
  } catch (e) {
    bestScore = 0;
  }

  var gravity = 0.5;
  var jumpPower = -8.5;
  var pipeGap = 160;
  var pipeWidth = 60;
  var pipeInterval = 100;

  function initGame() {
    bird = {
      x: canvas.width * 0.3,
      y: canvas.height / 2,
      velocity: 0,
      rotation: 0
    };
    pipes = [];
    score = 0;
    frameCount = 0;
    gameSpeed = canvas.width * 0.005;
  }

  var clouds = [];
  function initClouds() {
    clouds = [];
    for (var i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.4,
        size: 20 + Math.random() * 30,
        speed: 0.3 + Math.random() * 0.3
      });
    }
  }

  function drawCloud(x, y, size) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
    ctx.arc(x + size * 0.4, y - size * 0.2, size * 0.4, 0, Math.PI * 2);
    ctx.arc(x + size * 0.7, y, size * 0.45, 0, Math.PI * 2);
    ctx.fill();
  }

  function createPipe() {
    var minHeight = 50;
    var groundHeight = 80;
    var maxHeight = canvas.height - pipeGap - groundHeight - minHeight;
    if (maxHeight < minHeight) maxHeight = minHeight + 10;
    var topHeight = minHeight + Math.random() * maxHeight;

    pipes.push({
      x: canvas.width,
      topHeight: topHeight,
      bottomY: topHeight + pipeGap,
      passed: false
    });
  }

  function drawPipe(pipe) {
    var groundY = canvas.height - 80;

    var grad1 = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
    grad1.addColorStop(0, '#5cb85c');
    grad1.addColorStop(0.5, '#7ed67e');
    grad1.addColorStop(1, '#5cb85c');

    ctx.fillStyle = grad1;
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
    ctx.fillStyle = '#4a934a';
    ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);

    var bottomHeight = groundY - pipe.bottomY;
    ctx.fillStyle = grad1;
    ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, bottomHeight);
    ctx.fillStyle = '#4a934a';
    ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 20);
  }

  var groundOffset = 0;
  function drawGround() {
    var groundY = canvas.height - 80;
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, groundY, canvas.width, 80);

    ctx.fillStyle = '#c9b968';
    ctx.fillRect(0, groundY, canvas.width, 15);

    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    var count = Math.ceil(canvas.width / 20) + 1;
    for (var i = -1; i < count; i++) {
      ctx.beginPath();
      var xPos = (i * 20 + groundOffset) % (canvas.width + 20) - 10;
      ctx.arc(xPos, groundY + 30, 5, 0, Math.PI);
      ctx.fill();
    }
  }

  function checkCollision() {
    var groundY = canvas.height - 80;
    var birdRadius = 16;

    if (bird.y + birdRadius > groundY || bird.y - birdRadius < 0) {
      return true;
    }

    for (var i = 0; i < pipes.length; i++) {
      var pipe = pipes[i];
      if (bird.x + birdRadius > pipe.x && bird.x - birdRadius < pipe.x + pipeWidth) {
        if (bird.y - birdRadius < pipe.topHeight || bird.y + birdRadius > pipe.bottomY) {
          return true;
        }
      }
    }
    return false;
  }

  var particles = [];
  function createScoreParticle(x, y) {
    for (var i = 0; i < 8; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 1) * 4,
        life: 30,
        color: '#FFD700'
      });
    }
  }

  function updateParticles() {
    var newParticles = [];
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.life > 0) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
        newParticles.push(p);
      }
    }
    particles = newParticles;
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function update() {
    if (gameState !== 'playing') return;

    frameCount++;

    bird.velocity += gravity;
    bird.y += bird.velocity;
    bird.rotation = Math.min(Math.max(bird.velocity * 0.05, -0.5), 1.2);

    for (var i = 0; i < clouds.length; i++) {
      clouds[i].x -= clouds[i].speed;
      if (clouds[i].x < -clouds[i].size) {
        clouds[i].x = canvas.width + clouds[i].size;
        clouds[i].y = Math.random() * canvas.height * 0.4;
      }
    }

    groundOffset -= gameSpeed;

    if (frameCount % pipeInterval === 0) {
      createPipe();
    }

    for (var j = 0; j < pipes.length; j++) {
      var pipe = pipes[j];
      pipe.x -= gameSpeed;

      if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
        pipe.passed = true;
        score++;
        document.getElementById('scoreDisplay').textContent = score;
        createScoreParticle(bird.x, bird.y);
      }
    }

    var remainingPipes = [];
    for (var k = 0; k < pipes.length; k++) {
      if (pipes[k].x > -pipeWidth) {
        remainingPipes.push(pipes[k]);
      }
    }
    pipes = remainingPipes;

    updateParticles();

    if (checkCollision()) {
      endGame();
    }
  }

  function draw() {
    var skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#70c5ce');
    skyGrad.addColorStop(0.7, '#a8e0e6');
    skyGrad.addColorStop(1, '#ded895');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < clouds.length; i++) {
      drawCloud(clouds[i].x, clouds[i].y, clouds[i].size);
    }

    for (var j = 0; j < pipes.length; j++) {
      drawPipe(pipes[j]);
    }

    drawGround();
    drawParticles();

    if (gameState !== 'start') {
      drawBird(ctx, bird.x, bird.y, bird.rotation, characters[selectedCharIndex], 1, false);
    }
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  function showScreen(screenId) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) {
      screens[i].classList.remove('active');
    }
    document.getElementById(screenId).classList.add('active');
  }

  function startGame() {
    showScreen('startScreen');
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('scoreDisplay').style.display = 'block';
    document.getElementById('scoreDisplay').textContent = '0';

    initGame();
    initClouds();
    gameState = 'playing';
  }

  function endGame() {
    gameState = 'gameover';
    document.getElementById('scoreDisplay').style.display = 'none';

    if (score > bestScore) {
      bestScore = score;
      try {
        localStorage.setItem('flappyBest', bestScore.toString());
      } catch (e) {
        // localStorage 사용 불가 시 무시
      }
    }

    document.getElementById('finalScore').textContent = '점수: ' + score;
    document.getElementById('bestScore').textContent = '최고 점수: ' + bestScore;
    showScreen('gameOverScreen');
  }

  function flap() {
    if (gameState === 'playing') {
      bird.velocity = jumpPower;
    }
  }

  // ===================== 이벤트 리스너 =====================
  document.getElementById('startBtn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    startGame();
  });

  document.getElementById('retryBtn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showScreen('startScreen');
  });

  function handleGameTouch(e) {
    if (gameState === 'playing') {
      e.preventDefault();
      flap();
    }
  }

  canvas.addEventListener('touchstart', handleGameTouch, { passive: false });
  canvas.addEventListener('mousedown', function(e) {
    if (gameState === 'playing') {
      flap();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && gameState === 'playing') {
      e.preventDefault();
      flap();
    }
  });

  // 스크롤 방지 (모바일)
  document.body.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  // ===================== 초기화 =====================
  function init() {
    initClouds();
    showScreen('startScreen');
    gameLoop();
  }

  // DOM이 완전히 로드된 후 초기화
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 0);
  } else {
    document.addEventListener('DOMContentLoaded', init);
  }

})();
</script>

</body>
</html>
