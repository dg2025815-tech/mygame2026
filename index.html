<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 운석 파괴자 🚀</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: #050510;
    font-family: sans-serif;
  }

  #gameCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #hud {
    position: absolute;
    top: 15px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    color: white;
  }

  #livesDisplay {
    font-size: 1.5rem;
  }

  #scoreDisplay {
    font-size: 0.85rem; /* 요구사항: 아주 작게 표시 */
    color: rgba(255, 255, 255, 0.7);
    font-family: monospace;
    font-weight: bold;
  }

  #uiOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.6);
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: white;
    background: rgba(17, 17, 34, 0.95);
    border: 2px solid #00fff0;
    padding: 30px;
    border-radius: 15px;
    max-width: 350px;
    width: 90%;
    box-shadow: 0 0 20px rgba(0, 255, 240, 0.3);
  }

  .screen.active {
    display: flex;
  }

  h1 {
    font-size: 1.8rem;
    color: #00fff0;
    margin-bottom: 15px;
  }

  p {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 20px;
    color: #ccc;
  }

  button {
    background: #0072ff;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
  }

  button:hover {
    background: #00c6ff;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div id="livesDisplay">❤️❤️❤️</div>
  <div id="scoreDisplay">DESTROYED: 0 / 20</div>
</div>

<div id="uiOverlay">
  <!-- 시작 화면 -->
  <div class="screen active" id="startScreen">
    <h1>🚀 우주 운석 파괴자</h1>
    <p>
      운석 <b>20개</b>를 부수면 승리합니다!<br>
      ⚠️ <b>폭탄💣을 맞추면 점수 -2점!</b><br><br>
      ⌨️ <b>조작법</b><br>
      이동: 좌우 방향키 (← →)<br>
      발사: 스페이스바 (Space)
    </p>
    <button id="startBtn">게임 시작</button>
  </div>

  <!-- 결과 화면 -->
  <div class="screen" id="resultScreen">
    <h1 id="resultTitle">승리!</h1>
    <p id="resultDesc">모든 운석을 파괴했습니다.</p>
    <button id="retryBtn">다시 하기</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const livesDisplay = document.getElementById('livesDisplay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const uiOverlay = document.getElementById('uiOverlay');
  const startScreen = document.getElementById('startScreen');
  const resultScreen = document.getElementById('resultScreen');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let gameState = 'start';
  let score = 0;
  let lives = 3;
  let frameCount = 0;

  let player = { x: 0, y: 0, w: 40, h: 50, speed: 9, lastShot: 0 };
  let bullets = [];
  let meteors = [];
  let stars = [];
  let keys = { left: false, right: false, space: false };

  // 효과 전용 변수 (폭죽 & 번개 & 경고)
  let fireworks = [];
  let lightningOpacity = 0;
  let bombPenaltyFlash = 0;

  // 별 배경 생성
  for (let i = 0; i < 70; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 1 + 0.2
    });
  }

  function initGame() {
    score = 0;
    lives = 3;
    frameCount = 0;
    bullets = [];
    meteors = [];
    fireworks = [];
    lightningOpacity = 0;
    bombPenaltyFlash = 0;
    
    player.x = canvas.width / 2;
    player.y = canvas.height - 80;

    updateHUD();
  }

  function updateHUD() {
    livesDisplay.textContent = '❤️'.repeat(Math.max(0, lives));
    scoreDisplay.textContent = `DESTROYED: ${score} / 20`;
  }

  function shoot() {
    const now = Date.now();
    if (now - player.lastShot > 160) {
      bullets.push({
        x: player.x,
        y: player.y - player.h / 2,
        w: 6,
        h: 16,
        speed: 14
      });
      player.lastShot = now;
    }
  }

  // 운석/폭탄 생성 함수 (4/5 확률: 운석, 1/5 확률: 폭탄)
  function createMeteor() {
    const r = Math.random() * 15 + 18;
    const isBomb = Math.random() < 0.2; // 20% (1/5) 확률로 폭탄
    meteors.push({
      x: r + Math.random() * (canvas.width - r * 2),
      y: -r,
      r: r,
      speed: Math.random() * 2 + 2.5,
      isBomb: isBomb
    });
  }

  // 폭죽 생성 함수
  function createFirework() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * (canvas.height * 0.5);
    const colors = ['#ff0055', '#00fff0', '#ffea00', '#00ff66', '#ff00ff'];
    const color = colors[Math.floor(Math.random() * colors.length)];

    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 5 + 2;
      fireworks.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: color
      });
    }
  }

  function update() {
    // 별 이동 (항상 동작)
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > canvas.height) s.y = 0;
    });

    // 승리 효과 (폭죽) 업데이트
    if (gameState === 'win') {
      if (Math.random() < 0.1) createFirework();
      for (let i = fireworks.length - 1; i >= 0; i--) {
        let p = fireworks[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;
        if (p.alpha <= 0) fireworks.splice(i, 1);
      }
      return;
    }

    // 패배 효과 (번개) 업데이트
    if (gameState === 'gameover') {
      if (lightningOpacity > 0) lightningOpacity -= 0.05;
      return;
    }

    if (gameState !== 'playing') return;

    if (bombPenaltyFlash > 0) bombPenaltyFlash -= 0.05;

    frameCount++;

    if (keys.left && player.x - player.w / 2 > 0) player.x -= player.speed;
    if (keys.right && player.x + player.w / 2 < canvas.width) player.x += player.speed;
    if (keys.space) shoot();

    if (frameCount % 45 === 0) createMeteor();

    // 총알 이동
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y -= bullets[i].speed;
      if (bullets[i].y < -20) bullets.splice(i, 1);
    }

    // 운석/폭탄 이동 및 충돌
    for (let i = meteors.length - 1; i >= 0; i--) {
      let m = meteors[i];
      m.y += m.speed;

      if (m.y - m.r > canvas.height) {
        meteors.splice(i, 1);
        continue;
      }

      // 비행선 충돌 (운석이든 폭탄이든 부딪히면 목숨 -1)
      if (Math.hypot(player.x - m.x, player.y - m.y) < m.r + player.w / 2) {
        meteors.splice(i, 1);
        lives--;
        updateHUD();
        if (lives <= 0) endGame(false);
        continue;
      }

      // 총알 충돌
      for (let j = bullets.length - 1; j >= 0; j--) {
        let b = bullets[j];
        if (Math.hypot(b.x - m.x, b.y - m.y) < m.r + b.w) {
          bullets.splice(j, 1);
          
          if (m.isBomb) {
            // 폭탄을 맞춘 경우: -2점 감점! (최소 0점)
            score = Math.max(0, score - 2);
            bombPenaltyFlash = 0.4; // 붉은 경고 반짝임
          } else {
            // 일반 운석을 맞춘 경우: +1점
            score++;
          }

          meteors.splice(i, 1);
          updateHUD();

          if (score >= 20) endGame(true);
          break;
        }
      }
    }
  }

  function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 별
    ctx.fillStyle = '#ffffff';
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });

    if (gameState === 'playing') {
      // 비행선
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.fillStyle = '#00fff0';
      ctx.beginPath();
      ctx.moveTo(0, -player.h / 2);
      ctx.lineTo(-player.w / 2, player.h / 2);
      ctx.lineTo(player.w / 2, player.h / 2);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ff4b4b';
      ctx.beginPath();
      ctx.arc(0, player.h / 2 + 2, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // 총알
      ctx.fillStyle = '#ffea00';
      bullets.forEach(b => {
        ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
      });

      // 운석 및 폭탄 그리기
      meteors.forEach(m => {
        ctx.beginPath();
        if (m.isBomb) {
          // 폭탄 💣 디자인 (위험한 빨간색 + 불꽃 심지)
          ctx.fillStyle = '#ff2222';
          ctx.strokeStyle = '#880000';
          ctx.lineWidth = 3;
          ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          // 심지 불빛
          ctx.fillStyle = '#ffea00';
          ctx.beginPath();
          ctx.arc(m.x, m.y - m.r - 2, 4, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // 일반 운석 디자인
          ctx.fillStyle = '#a8927a';
          ctx.strokeStyle = '#5a4d41';
          ctx.lineWidth = 2;
          ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
      });

      // 폭탄 맞췄을 때 붉은 페널티 섬광
      if (bombPenaltyFlash > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${bombPenaltyFlash})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    // 승리 폭죽 그리기
    if (gameState === 'win') {
      fireworks.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // 패배 강렬한 번개 그리기
    if (gameState === 'gameover' && lightningOpacity > 0) {
      ctx.fillStyle = `rgba(255, 0, 50, ${lightningOpacity})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    initGame();
    gameState = 'playing';
    uiOverlay.style.display = 'none';
  }

  function endGame(isWin) {
    gameState = isWin ? 'win' : 'gameover';
    uiOverlay.style.display = 'flex';
    startScreen.classList.remove('active');
    resultScreen.classList.add('active');

    const resultTitle = document.getElementById('resultTitle');
    const resultDesc = document.getElementById('resultDesc');

    if (isWin) {
      resultTitle.textContent = '🎉 WIN!';
      resultTitle.style.color = '#00fff0';
      resultDesc.textContent = '운석 20개를 모두 파괴했습니다!';
      for(let i=0; i<5; i++) createFirework();
    } else {
      resultTitle.textContent = '💥 GAME OVER';
      resultTitle.style.color = '#ff4b4b';
      resultDesc.textContent = '목숨을 모두 잃었습니다.';
      lightningOpacity = 0.9;
    }
  }

  document.getElementById('startBtn').onclick = startGame;
  document.getElementById('retryBtn').onclick = function() {
    resultScreen.classList.remove('active');
    startScreen.classList.add('active');
  };

  window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') keys.space = true;
  });

  window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.space = false;
  });

  loop();
</script>
</body>
</html>
