<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Friends 🐦</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #70c5ce;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    touch-action: manipulation;
  }

  #gameContainer {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    background: linear-gradient(180deg, #70c5ce 0%, #a8e0e6 70%, #ded895 100%);
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
  }

  #uiOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: white;
    background: rgba(0, 0, 0, 0.75);
    padding: 25px 20px;
    border-radius: 20px;
    width: 85%;
    max-width: 320px;
  }

  .screen.active {
    display: flex;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 2px 2px 0px #ff6b6b;
  }

  h2 {
    font-size: 1.1rem;
    margin-bottom: 15px;
    font-weight: normal;
  }

  .char-select {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .char-card {
    background: rgba(255, 255, 255, 0.9);
    border: 3px solid transparent;
    border-radius: 12px;
    padding: 8px;
    cursor: pointer;
    width: 75px;
    transition: transform 0.15s;
  }

  .char-card.selected {
    border-color: #ffd700;
    transform: scale(1.08);
    background: #ffffff;
  }

  .char-card canvas {
    background: transparent;
    box-shadow: none;
    margin: 0 auto;
    pointer-events: none;
  }

  .char-name {
    color: #333;
    font-size: 0.8rem;
    font-weight: bold;
    margin-top: 4px;
    pointer-events: none;
  }

  .btn {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 14px 32px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 30px;
    box-shadow: 0 4px 0 #d64545;
    cursor: pointer;
    margin-top: 10px;
    width: 80%;
    display: inline-block;
  }

  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #d64545;
  }

  #scoreDisplay {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3rem;
    color: white;
    font-weight: bold;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    display: none;
    pointer-events: none;
    z-index: 50;
  }

  .guide {
    font-size: 0.8rem;
    margin-top: 12px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="scoreDisplay">0</div>

  <div id="uiOverlay">
    <!-- 시작 화면 -->
    <div class="screen active" id="startScreen">
      <h1>Flappy Friends</h1>
      <h2>캐릭터를 선택하세요</h2>
      <div class="char-select" id="charSelect"></div>
      <div class="btn" id="startBtn">게임 시작</div>
      <p class="guide">📱 시작 후 화면 어디든 눌러 점프!</p>
    </div>

    <!-- 게임오버 화면 -->
    <div class="screen" id="gameOverScreen">
      <h1>게임 오버!</h1>
      <h2 id="finalScore" style="margin-bottom: 5px;">점수: 0</h2>
      <h2 id="bestScore" style="margin-bottom: 15px; color: #ffd700;">최고 점수: 0</h2>
      <div class="btn" id="retryBtn">다시 하기</div>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const uiOverlay = document.getElementById('uiOverlay');

  function resizeCanvas() {
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > 2/3) {
      w = h * (2/3);
    } else {
      h = w * (3/2);
    }
    canvas.width = w;
    canvas.height = h;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const characters = [
    { name: '병아리', body: '#FFD93D', wing: '#FFA500', accent: '#FF6B6B', type: 'chick' },
    { name: '문어', body: '#FF6B9D', wing: '#C44569', accent: '#FFFFFF', type: 'octopus' },
    { name: '드래곤', body: '#6BCB77', wing: '#4D96FF', accent: '#FFD93D', type: 'dragon' }
  ];
  let selectedCharIndex = 0;

  function drawBird(context, x, y, rotation, charData, isPreview) {
    context.save();
    context.translate(x, y);
    if (!isPreview) context.rotate(rotation);
    
    const size = isPreview ? 18 : canvas.width * 0.045;

    if (charData.type === 'chick') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.ellipse(0, 0, size, size * 0.85, 0, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      context.beginPath();
      context.ellipse(-size*0.3, size*0.1, size*0.5, size*0.35, -0.3, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = '#333';
      context.beginPath();
      context.arc(size*0.35, -size*0.15, size*0.15, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.accent;
      context.beginPath();
      context.moveTo(size*0.7, 0);
      context.lineTo(size*1.15, size*0.08);
      context.lineTo(size*0.7, size*0.25);
      context.closePath();
      context.fill();
    } 
    else if (charData.type === 'octopus') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.arc(0, -size*0.1, size*0.85, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      for (let i = -2; i <= 2; i++) {
        context.beginPath();
        context.arc(i * size*0.3, size*0.5, size*0.22, 0, Math.PI * 2);
        context.fill();
      }

      context.fillStyle = '#333';
      context.beginPath();
      context.arc(-size*0.2, -size*0.15, size*0.12, 0, Math.PI * 2);
      context.arc(size*0.2, -size*0.15, size*0.12, 0, Math.PI * 2);
      context.fill();
    } 
    else if (charData.type === 'dragon') {
      context.fillStyle = charData.body;
      context.beginPath();
      context.ellipse(0, 0, size, size * 0.85, 0, 0, Math.PI * 2);
      context.fill();

      context.fillStyle = charData.wing;
      context.beginPath();
      context.moveTo(-size*0.2, -size*0.1);
      context.lineTo(-size*0.9, -size*0.6);
      context.lineTo(-size*0.4, size*0.3);
      context.closePath();
      context.fill();

      context.fillStyle = charData.accent;
      context.beginPath();
      context.moveTo(-size*0.2, -size*0.7);
      context.lineTo(-size*0.1, -size*1.1);
      context.lineTo(size*0.1, -size*0.7);
      context.closePath();
      context.fill();

      context.fillStyle = '#333';
      context.beginPath();
      context.arc(size*0.35, -size*0.15, size*0.15, 0, Math.PI * 2);
      context.fill();
    }
    context.restore();
  }

  const charSelectDiv = document.getElementById('charSelect');
  characters.forEach((char, index) => {
    const card = document.createElement('div');
    card.className = 'char-card' + (index === 0 ? ' selected' : '');
    
    const pCanvas = document.createElement('canvas');
    pCanvas.width = 50;
    pCanvas.height = 50;
    
    const name = document.createElement('div');
    name.className = 'char-name';
    name.textContent = char.name;

    card.appendChild(pCanvas);
    card.appendChild(name);
    
    card.onclick = function() {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedCharIndex = index;
    };

    charSelectDiv.appendChild(card);
    drawBird(pCanvas.getContext('2d'), 25, 25, 0, char, true);
  });

  let gameState = 'start'; 
  let bird, pipes, score, bestScore, frameCount;

  bestScore = parseInt(localStorage.getItem('flappyBest_v4')) || 0;

  function initGame() {
    bird = {
      x: canvas.width * 0.28,
      y: canvas.height * 0.4,
      velocity: 0,
      rotation: 0
    };
    pipes = [];
    score = 0;
    frameCount = 0;
  }

  function flap() {
    if (gameState === 'playing') {
      bird.velocity = -canvas.height * 0.012;
    }
  }

  function createPipe() {
    const pipeGap = canvas.height * 0.26;
    const minH = canvas.height * 0.1;
    const maxH = canvas.height - pipeGap - (canvas.height * 0.15);
    const topH = minH + Math.random() * (maxH - minH);

    pipes.push({
      x: canvas.width,
      width: canvas.width * 0.14,
      topHeight: topH,
      bottomY: topH + pipeGap,
      passed: false
    });
  }

  function update() {
    if (gameState !== 'playing') return;

    frameCount++;

    bird.velocity += canvas.height * 0.00065;
    bird.y += bird.velocity;
    bird.rotation = Math.min(Math.max(bird.velocity * 0.05, -0.4), 0.8);

    if (frameCount % 90 === 0) {
      createPipe();
    }

    const groundY = canvas.height - (canvas.height * 0.1);
    const birdR = canvas.width * 0.04;

    if (bird.y + birdR >= groundY || bird.y - birdR <= 0) {
      endGame();
    }

    for (let i = 0; i < pipes.length; i++) {
      let p = pipes[i];
      p.x -= canvas.width * 0.006;

      if (!p.passed && p.x + p.width < bird.x) {
        p.passed = true;
        score++;
        scoreDisplay.textContent = score;
      }

      if (bird.x + birdR > p.x && bird.x - birdR < p.x + p.width) {
        if (bird.y - birdR < p.topHeight || bird.y + birdR > p.bottomY) {
          endGame();
        }
      }
    }

    pipes = pipes.filter(p => p.x > -p.width);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const groundY = canvas.height - (canvas.height * 0.1);

    pipes.forEach(p => {
      ctx.fillStyle = '#5cb85c';
      ctx.fillRect(p.x, 0, p.width, p.topHeight);
      ctx.fillRect(p.x, p.bottomY, p.width, groundY - p.bottomY);

      ctx.fillStyle = '#4a934a';
      ctx.fillRect(p.x - 3, p.topHeight - 15, p.width + 6, 15);
      ctx.fillRect(p.x - 3, p.bottomY, p.width + 6, 15);
    });

    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
    ctx.fillStyle = '#c9b968';
    ctx.fillRect(0, groundY, canvas.width, 10);

    if (gameState === 'playing') {
      drawBird(ctx, bird.x, bird.y, bird.rotation, characters[selectedCharIndex], false);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('gameOverScreen').classList.remove('active');
    uiOverlay.style.display = 'none'; // UI 완전히 숨김
    
    scoreDisplay.style.display = 'block';
    scoreDisplay.textContent = '0';

    initGame();
    gameState = 'playing';
  }

  function endGame() {
    gameState = 'gameover';
    uiOverlay.style.display = 'flex'; // UI 다시 표시
    scoreDisplay.style.display = 'none';

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('flappyBest_v4', bestScore);
    }

    document.getElementById('finalScore').textContent = `점수: ${score}`;
    document.getElementById('bestScore').textContent = `최고 점수: ${bestScore}`;
    document.getElementById('gameOverScreen').classList.add('active');
  }

  // 버튼 온클릭 이벤트
  document.getElementById('startBtn').onclick = function() {
    startGame();
  };

  document.getElementById('retryBtn').onclick = function() {
    document.getElementById('gameOverScreen').classList.remove('active');
    document.getElementById('startScreen').classList.add('active');
  };

  // 게임 조작 (전체 화면 클릭/터치)
  window.addEventListener('pointerdown', function(e) {
    if (gameState === 'playing') {
      flap();
    }
  });

  window.addEventListener('keydown', function(e) {
    if (e.code === 'Space') flap();
  });

  loop();
});
</script>
</body>
</html>
