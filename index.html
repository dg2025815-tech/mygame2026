<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우주 운석 파괴자 🚀</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #050510;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    touch-action: none;
  }

  #gameContainer {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    background: radial-gradient(circle at center, #111133 0%, #050510 100%);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }

  /* 게임 상단 HUD (목숨 및 점수) */
  #hud {
    position: absolute;
    top: 10px;
    left: 0;
    width: 100%;
    padding: 0 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }

  #livesDisplay {
    font-size: 1.2rem;
  }

  #scoreDisplay {
    font-size: 0.85rem; /* 요구사항: 아주 작게 표시 */
    color: #88ffffff;
    font-family: monospace;
    font-weight: bold;
  }

  /* 메인 UI 화면 (시작, 승리, 패배) */
  #uiOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: white;
    background: rgba(10, 10, 30, 0.85);
    border: 2px solid #4d96ff;
    padding: 30px 20px;
    border-radius: 20px;
    width: 85%;
    max-width: 320px;
    box-shadow: 0 0 15px rgba(77, 150, 255, 0.4);
  }

  .screen.active {
    display: flex;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: #00fff0;
    text-shadow: 0 0 8px rgba(0, 255, 240, 0.6);
  }

  p {
    font-size: 0.9rem;
    margin-bottom: 20px;
    line-height: 1.4;
    color: #ddddff;
  }

  .btn {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 114, 255, 0.4);
    width: 80%;
  }

  .btn:active {
    transform: scale(0.96);
  }

  /* 모바일 컨트롤러 UI */
  #mobileControls {
    position: absolute;
    bottom: 15px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
    z-index: 20;
  }

  .touch-btn {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 15px 25px;
    border-radius: 15px;
    font-size: 1rem;
    font-weight: bold;
    pointer-events: auto;
    backdrop-filter: blur(4px);
  }

  .touch-btn:active {
    background: rgba(0, 255, 240, 0.4);
  }

  #fireBtn {
    background: rgba(255, 75, 75, 0.3);
    border-color: rgba(255, 75, 75, 0.5);
    padding: 15px 35px;
  }

  #fireBtn:active {
    background: rgba(255, 75, 75, 0.6);
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="livesDisplay">❤️❤️❤️</div>
    <div id="scoreDisplay">DESTROYED: 0 / 20</div>
  </div>

  <div id="uiOverlay">
    <!-- 시작 화면 -->
    <div class="screen active" id="startScreen">
      <h1>🚀 우주 운석 파괴자</h1>
      <p>운석 <b>20개</b>를 부수면 승리합니다!<br><br>⌨️ <b>PC</b>: ← → 이동 / Space 발사<br>📱 <b>모바일</b>: 하단 버튼 터치</p>
      <div class="btn" id="startBtn">게임 시작</div>
    </div>

    <!-- 결과 화면 -->
    <div class="screen" id="resultScreen">
      <h1 id="resultTitle">승리!</h1>
      <p id="resultDesc">모든 운석을 파괴했습니다.</p>
      <div class="btn" id="retryBtn">다시 하기</div>
    </div>
  </div>

  <!-- 모바일용 조작 버튼 -->
  <div id="mobileControls">
    <div style="display: flex; gap: 10px;">
      <div class="touch-btn" id="leftBtn">◀</div>
      <div class="touch-btn" id="rightBtn">▶</div>
    </div>
    <div class="touch-btn" id="fireBtn">🔥 FIRE</div>
  </div>
</div>

<script>
window.addEventListener('load', function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const livesDisplay = document.getElementById('livesDisplay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const uiOverlay = document.getElementById('uiOverlay');
  const startScreen = document.getElementById('startScreen');
  const resultScreen = document.getElementById('resultScreen');

  // 캔버스 크기 조정
  function resizeCanvas() {
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > 2/3) {
      w = h * (2/3);
    } else {
      h = w * (3/2);
    }
    canvas.width = w;
    canvas.height = h;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // 게임 상태 변수
  let gameState = 'start';
  let score = 0;
  let lives = 3;
  let frameCount = 0;

  // 객체 변수
  let player, bullets, meteors, stars;
  let keys = { left: false, right: false, space: false };

  // 별 배경 생성
  function initStars() {
    stars = [];
    for (let i = 0; i < 40; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.2
      });
    }
  }

  // 게임 초기화
  function initGame() {
    score = 0;
    lives = 3;
    frameCount = 0;
    bullets = [];
    meteors = [];
    
    player = {
      width: canvas.width * 0.08,
      height: canvas.width * 0.1,
      x: canvas.width / 2,
      y: canvas.height - (canvas.height * 0.12),
      speed: canvas.width * 0.015,
      lastShot: 0
    };

    updateHUD();
    initStars();
  }

  function updateHUD() {
    livesDisplay.textContent = '❤️'.repeat(Math.max(0, lives));
    scoreDisplay.textContent = `DESTROYED: ${score} / 20`;
  }

  // 총알 발사
  function shoot() {
    const now = Date.now();
    if (now - player.lastShot > 200) { // 0.2초 쿨타임
      bullets.push({
        x: player.x,
        y: player.y - player.height / 2,
        radius: canvas.width * 0.01,
        speed: canvas.height * 0.02
      });
      player.lastShot = now;
    }
  }

  // 운석 생성
  function createMeteor() {
    const radius = canvas.width * (0.04 + Math.random() * 0.03); // 크기 밸런스
    meteors.push({
      x: radius + Math.random() * (canvas.width - radius * 2),
      y: -radius,
      radius: radius,
      speed: canvas.height * (0.004 + Math.random() * 0.003), // 낙하 속도
      hp: 1
    });
  }

  // 업데이트
  function update() {
    if (gameState !== 'playing') return;

    frameCount++;

    // 별 이동
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > canvas.height) s.y = 0;
    });

    // 플레이어 이동
    if (keys.left && player.x - player.width/2 > 0) {
      player.x -= player.speed;
    }
    if (keys.right && player.x + player.width/2 < canvas.width) {
      player.x += player.speed;
    }
    if (keys.space) {
      shoot();
    }

    // 운석 생성 (약 1초마다)
    if (frameCount % 60 === 0) {
      createMeteor();
    }

    // 총알 이동
    for (let i = bullets.length - 1; i >= 0; i--) {
      let b = bullets[i];
      b.y -= b.speed;
      if (b.y < 0) bullets.splice(i, 1);
    }

    // 운석 이동 및 충돌 검사
    for (let i = meteors.length - 1; i >= 0; i--) {
      let m = meteors[i];
      m.y += m.speed;

      // 화면 아래로 탈출 시 (목숨 차감 없이 소멸만 처리)
      if (m.y - m.radius > canvas.height) {
        meteors.splice(i, 1);
        continue;
      }

      // 비행선과 운석 충돌
      const distToPlayer = Math.hypot(player.x - m.x, player.y - m.y);
      if (distToPlayer < m.radius + player.width / 2) {
        meteors.splice(i, 1);
        lives--;
        updateHUD();
        if (lives <= 0) {
          endGame(false);
        }
        continue;
      }

      // 총알과 운석 충돌
      for (let j = bullets.length - 1; j >= 0; j--) {
        let b = bullets[j];
        const distToBullet = Math.hypot(b.x - m.x, b.y - m.y);
        
        if (distToBullet < m.radius + b.radius) {
          bullets.splice(j, 1);
          meteors.splice(i, 1);
          score++;
          updateHUD();

          if (score >= 20) {
            endGame(true);
          }
          break;
        }
      }
    }
  }

  // 렌더링
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 배경 별
    ctx.fillStyle = '#ffffff';
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });

    if (gameState === 'playing') {
      // 플레이어 (비행선) 그리기
      ctx.save();
      ctx.translate(player.x, player.y);
      
      // 비행선 몸체
      ctx.fillStyle = '#00fff0';
      ctx.beginPath();
      ctx.moveTo(0, -player.height / 2);
      ctx.lineTo(-player.width / 2, player.height / 2);
      ctx.lineTo(player.width / 2, player.height / 2);
      ctx.closePath();
      ctx.fill();

      // 날개 및 엔진 빛
      ctx.fillStyle = '#ff4b4b';
      ctx.beginPath();
      ctx.arc(0, player.height / 2, player.width * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // 총알 그리기
      ctx.fillStyle = '#ffea00';
      bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      // 운석 그리기
      meteors.forEach(m => {
        ctx.fillStyle = '#a8927a';
        ctx.strokeStyle = '#6e5d4f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    initGame();
    gameState = 'playing';
    uiOverlay.style.display = 'none';
  }

  function endGame(isWin) {
    gameState = isWin ? 'win' : 'gameover';
    uiOverlay.style.display = 'flex';
    startScreen.classList.remove('active');
    resultScreen.classList.add('active');

    const resultTitle = document.getElementById('resultTitle');
    const resultDesc = document.getElementById('resultDesc');

    if (isWin) {
      resultTitle.textContent = '🎉 MISSION COMPLETE!';
      resultTitle.style.color = '#00fff0';
      resultDesc.textContent = '모든 운석(20개)을 성공적으로 파괴했습니다!';
    } else {
      resultTitle.textContent = '💥 MISSION FAILED';
      resultTitle.style.color = '#ff4b4b';
      resultDesc.textContent = '목숨을 모두 잃었습니다. 다시 시도해보세요!';
    }
  }

  // 버튼 이벤트
  document.getElementById('startBtn').onclick = startGame;
  document.getElementById('retryBtn').onclick = function() {
    resultScreen.classList.remove('active');
    startScreen.classList.add('active');
  };

  // 키보드 조작 (PC)
  window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') keys.space = true;
  });

  window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.space = false;
  });

  // 터치 조작 (모바일)
  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const fireBtn = document.getElementById('fireBtn');

  leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
  leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });

  rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = false; keys.right = true; });
  rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });

  fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.space = true; });
  fireBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.space = false; });

  loop();
});
</script>
</body>
</html>
